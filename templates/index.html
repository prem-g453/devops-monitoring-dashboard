<!DOCTYPE html>
<html>
<head>
    <title>DevOps Monitoring Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#0f172a;
            color:white;
        }
        .card{
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container text-center mt-5">

<h1 class="mb-5">🚀 DevOps Monitoring Dashboard</h1>

<div class="row">

<div class="col-md-3">
<div class="card bg-primary">
<div class="card-body">
<h4>Hostname</h4>
<h5>{{hostname}}</h5>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success">
<div class="card-body">
<h4>CPU Usage</h4>
<h5>{{cpu}}%</h5>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning text-dark">
<div class="card-body">
<h4>Memory Usage</h4>
<h5>{{memory}}%</h5>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger">
<div class="card-body">
<h4>Disk Usage</h4>
<h5>{{disk}}%</h5>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
